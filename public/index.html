<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Listen</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <!-- PDF.js for client-side PDF extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e8e8e8;
      padding: 20px;
      padding-bottom: 100px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .input-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    input[type="text"], input[type="url"], textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 16px;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    .file-input-wrapper {
      position: relative;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 16px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-input-label:hover {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.1);
    }

    .file-input-label.has-file {
      border-style: solid;
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    input[type="file"] {
      display: none;
    }

    .divider {
      text-align: center;
      color: #666;
      margin: 15px 0;
      font-size: 0.8rem;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .options {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .option {
      flex: 1;
    }

    select {
      width: 100%;
      padding: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #e94560;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      display: none;
    }

    .status.loading {
      display: block;
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .status.success {
      display: block;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: #4ade80;
    }

    .player-section {
      display: none;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .player-section.visible {
      display: block;
    }

    .article-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: #fff;
    }

    .article-meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 15px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .download-btn {
      margin-top: 15px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .download-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Library Section */
    .library-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .library-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .library-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    .library-empty {
      text-align: center;
      color: #666;
      padding: 20px;
      font-size: 0.9rem;
    }

    .library-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .library-item:hover {
      background: rgba(233, 69, 96, 0.1);
    }

    .library-item.playing {
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid rgba(233, 69, 96, 0.3);
    }

    .library-item-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .library-item-info {
      flex: 1;
      min-width: 0;
    }

    .library-item-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .library-item-meta {
      font-size: 0.75rem;
      color: #888;
      margin-top: 2px;
    }

    .library-item-progress {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .library-item-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .library-item-delete {
      padding: 8px;
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .library-item-delete:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .install-prompt {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      max-width: 500px;
      margin: 0 auto;
      background: #2a2a4a;
      padding: 15px 20px;
      border-radius: 12px;
      display: none;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .install-prompt.visible {
      display: flex;
    }

    .install-prompt p {
      flex: 1;
      font-size: 0.9rem;
    }

    .install-prompt button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .install-btn {
      background: #e94560;
      color: white;
    }

    .dismiss-btn {
      background: transparent;
      color: #888;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: #666;
      font-size: 0.8rem;
    }

    .footer a {
      color: #e94560;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .hint {
      font-size: 0.75rem;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎧 Helix Listen</h1>
    <p class="tagline">Turn any article, PDF, or markdown into audio</p>

    <div class="input-section">
      <!-- Input Type Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="url">URL</button>
        <button class="tab" data-tab="pdf">PDF</button>
        <button class="tab" data-tab="markdown">Markdown</button>
        <button class="tab" data-tab="text">Paste Text</button>
      </div>

      <!-- URL Tab -->
      <div class="tab-content active" id="tab-url">
        <div class="input-group">
          <label for="url-input">Paste article URL</label>
          <input type="url" id="url-input" placeholder="https://example.com/article">
          <p class="hint">Works best with blogs, news sites without paywalls</p>
        </div>
      </div>

      <!-- PDF Tab -->
      <div class="tab-content" id="tab-pdf">
        <div class="input-group">
          <label>Upload a PDF</label>
          <div class="file-input-wrapper">
            <label class="file-input-label" id="file-label" for="pdf-input">
              <span>📄</span>
              <span id="file-name">Choose PDF file</span>
            </label>
            <input type="file" id="pdf-input" accept=".pdf">
          </div>
        </div>
      </div>

      <!-- Markdown Tab -->
      <div class="tab-content" id="tab-markdown">
        <div class="input-group">
          <label>Upload a Markdown file</label>
          <div class="file-input-wrapper">
            <label class="file-input-label" id="md-file-label" for="md-input">
              <span>📝</span>
              <span id="md-file-name">Choose .md file</span>
            </label>
            <input type="file" id="md-input" accept=".md,.markdown">
          </div>
        </div>
      </div>

      <!-- Text Tab -->
      <div class="tab-content" id="tab-text">
        <div class="input-group">
          <label for="text-input">Paste your text</label>
          <textarea id="text-input" placeholder="Paste article text here..."></textarea>
        </div>
      </div>

      <div class="options">
        <div class="option">
          <label for="voice-select">Voice</label>
          <select id="voice-select">
            <option value="English_expressive_narrator">Expressive Narrator</option>
            <option value="English_CaptivatingStoryteller">Captivating Storyteller</option>
            <option value="English_CalmWoman">Calm Woman</option>
            <option value="English_magnetic_voiced_man">Magnetic Man</option>
            <option value="English_radiant_girl">Radiant Girl</option>
            <option value="English_ManWithDeepVoice">Deep Voice</option>
          </select>
        </div>
        <div class="option">
          <label for="speed-select">Speed</label>
          <select id="speed-select">
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" id="convert-btn">
        <span>🎙️</span>
        <span>Convert to Audio</span>
      </button>

      <div class="status" id="status"></div>
    </div>

    <div class="player-section" id="player-section">
      <div class="article-title" id="article-title"></div>
      <div class="article-meta" id="article-meta"></div>
      <audio id="audio-player" controls></audio>
      <button class="btn download-btn" id="download-btn">
        <span>⬇️</span>
        <span>Download MP3</span>
      </button>
    </div>

    <!-- Library Section -->
    <div class="library-section" id="library-section">
      <div class="library-header">
        <div class="library-title">Recent Audio</div>
      </div>
      <div id="library-list">
        <div class="library-empty">No saved audio yet. Convert something to get started.</div>
      </div>
    </div>

    <footer class="footer">
      Suhit Anantula | <a href="https://suhitanantula.com" target="_blank">suhitanantula.com</a>
    </footer>
  </div>

  <div class="install-prompt" id="install-prompt">
    <p>Install Helix Listen for quick access from your home screen</p>
    <button class="dismiss-btn" id="dismiss-install">Later</button>
    <button class="install-btn" id="install-btn">Install</button>
  </div>

  <script>
    // Initialize PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Elements
    const urlInput = document.getElementById('url-input');
    const pdfInput = document.getElementById('pdf-input');
    const mdInput = document.getElementById('md-input');
    const textInput = document.getElementById('text-input');
    const fileLabel = document.getElementById('file-label');
    const fileName = document.getElementById('file-name');
    const mdFileLabel = document.getElementById('md-file-label');
    const mdFileName = document.getElementById('md-file-name');
    const voiceSelect = document.getElementById('voice-select');
    const speedSelect = document.getElementById('speed-select');
    const convertBtn = document.getElementById('convert-btn');
    const status = document.getElementById('status');
    const playerSection = document.getElementById('player-section');
    const articleTitle = document.getElementById('article-title');
    const articleMeta = document.getElementById('article-meta');
    const audioPlayer = document.getElementById('audio-player');
    const downloadBtn = document.getElementById('download-btn');

    let currentAudioBlob = null;
    let currentTitle = '';
    let activeTab = 'url';

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        document.getElementById(`tab-${activeTab}`).classList.add('active');
      });
    });

    // Handle PDF file selection
    pdfInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        const file = e.target.files[0];
        fileName.textContent = file.name;
        fileLabel.classList.add('has-file');
      }
    });

    // Handle Markdown file selection
    mdInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        const file = e.target.files[0];
        mdFileName.textContent = file.name;
        mdFileLabel.classList.add('has-file');
      }
    });

    // Strip markdown syntax to plain text
    function stripMarkdown(md) {
      return md
        .replace(/```[\s\S]*?```/g, '')          // code blocks
        .replace(/`([^`]+)`/g, '$1')              // inline code
        .replace(/!\[.*?\]\(.*?\)/g, '')          // images
        .replace(/\[([^\]]+)\]\(.*?\)/g, '$1')    // links → text
        .replace(/^#{1,6}\s+/gm, '')              // headers
        .replace(/(\*\*|__)(.*?)\1/g, '$2')       // bold
        .replace(/(\*|_)(.*?)\1/g, '$2')          // italic
        .replace(/~~(.*?)~~/g, '$1')              // strikethrough
        .replace(/^\s*[-*+]\s+/gm, '')            // unordered lists
        .replace(/^\s*\d+\.\s+/gm, '')            // ordered lists
        .replace(/^\s*>\s+/gm, '')                // blockquotes
        .replace(/^---+$/gm, '')                  // horizontal rules
        .replace(/<[^>]+>/g, '')                   // HTML tags
        .replace(/\|.*\|/g, '')                    // table rows
        .replace(/^\s*[-:]+\s*\|/gm, '')          // table separators
        .replace(/\n{3,}/g, '\n\n')               // excess newlines
        .trim();
    }

    // Extract text from PDF using PDF.js (client-side)
    async function extractPdfText(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + '\n\n';
      }

      return fullText.trim();
    }

    // Convert button handler
    convertBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      const pdfFile = pdfInput.files[0];
      const mdFile = mdInput.files[0];
      const pastedText = textInput.value.trim();

      // Check based on active tab
      if (activeTab === 'url' && !url) {
        showStatus('Please enter a URL', 'error');
        return;
      }
      if (activeTab === 'pdf' && !pdfFile) {
        showStatus('Please upload a PDF', 'error');
        return;
      }
      if (activeTab === 'markdown' && !mdFile) {
        showStatus('Please upload a Markdown file', 'error');
        return;
      }
      if (activeTab === 'text' && !pastedText) {
        showStatus('Please paste some text', 'error');
        return;
      }

      convertBtn.disabled = true;
      convertBtn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';
      playerSection.classList.remove('visible');

      try {
        let extracted;

        if (activeTab === 'text') {
          // Direct text - skip extraction API
          const wordCount = pastedText.split(/\s+/).length;
          extracted = {
            title: 'Pasted Text',
            text: pastedText,
            wordCount,
            estimatedMinutes: Math.ceil(wordCount / 150),
          };
        } else if (activeTab === 'markdown') {
          // Read and strip markdown client-side
          showStatus('Processing Markdown file...', 'loading');
          const rawMd = await mdFile.text();
          const plainText = stripMarkdown(rawMd);

          if (!plainText || plainText.length < 20) {
            throw new Error('Could not extract readable text from the Markdown file.');
          }

          const wordCount = plainText.split(/\s+/).length;
          extracted = {
            title: mdFile.name.replace(/\.(md|markdown)$/i, ''),
            text: plainText,
            wordCount,
            estimatedMinutes: Math.ceil(wordCount / 150),
          };
        } else if (activeTab === 'pdf') {
          // Extract PDF text client-side
          showStatus('Extracting text from PDF...', 'loading');
          const pdfText = await extractPdfText(pdfFile);

          if (!pdfText || pdfText.length < 50) {
            throw new Error('Could not extract text from PDF. The file may be scanned or image-based.');
          }

          const wordCount = pdfText.split(/\s+/).length;
          extracted = {
            title: pdfFile.name.replace('.pdf', ''),
            text: pdfText,
            wordCount,
            estimatedMinutes: Math.ceil(wordCount / 150),
          };
        } else {
          // URL - use server-side extraction
          showStatus('Extracting article...', 'loading');

          const extractRes = await fetch('/api/extract', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });

          const responseText = await extractRes.text();

          try {
            extracted = JSON.parse(responseText);
          } catch (e) {
            console.error('Response was not JSON:', responseText.substring(0, 200));
            throw new Error('Server error. The site may be blocking access. Try pasting the text directly.');
          }

          if (!extractRes.ok) {
            throw new Error(extracted.error || 'Failed to extract article');
          }
        }

        currentTitle = extracted.title;

        // Step 2: Convert to speech
        showStatus(`Converting ${extracted.wordCount} words to speech (~${extracted.estimatedMinutes} min)...`, 'loading');

        const voice = voiceSelect.value;
        const speed = parseFloat(speedSelect.value);

        const speakRes = await fetch('/api/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text: extracted.text,
            voice,
            speed,
          }),
        });

        if (!speakRes.ok) {
          const errText = await speakRes.text();
          let errMsg = 'Failed to generate speech';
          try {
            const errJson = JSON.parse(errText);
            errMsg = errJson.error || errMsg;
          } catch (e) {}
          throw new Error(errMsg);
        }

        // Create audio blob
        currentAudioBlob = await speakRes.blob();
        const audioUrl = URL.createObjectURL(currentAudioBlob);

        // Update player
        articleTitle.textContent = extracted.title;
        articleMeta.textContent = `${extracted.wordCount} words • ~${extracted.estimatedMinutes} min`;
        audioPlayer.src = audioUrl;
        playerSection.classList.add('visible');

        showStatus('Ready to play!', 'success');

        // Save to library
        const savedItem = await saveToLibrary(
          extracted.title,
          currentAudioBlob,
          extracted.wordCount,
          extracted.estimatedMinutes * 60 // estimated duration in seconds
        );
        currentPlayingId = savedItem.id;
        renderLibrary();

        // Auto-play
        audioPlayer.play().catch(() => {
          showStatus('Tap play to start', 'success');
        })

      } catch (error) {
        console.error(error);
        showStatus(error.message, 'error');
      } finally {
        convertBtn.disabled = false;
        convertBtn.innerHTML = '<span>🎙️</span><span>Convert to Audio</span>';
      }
    });

    // Download handler
    downloadBtn.addEventListener('click', () => {
      if (!currentAudioBlob) return;

      const url = URL.createObjectURL(currentAudioBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${currentTitle.replace(/[^a-z0-9]/gi, '_')}.mp3`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // Helper functions
    function showStatus(message, type) {
      status.textContent = message;
      status.className = 'status ' + type;
    }

    // Handle share target and extension parameters
    const urlParams = new URLSearchParams(window.location.search);

    // Check for text from extension
    const extensionText = urlParams.get('text');
    const extensionTitle = urlParams.get('title');
    const extensionVoice = urlParams.get('voice');
    const extensionSpeed = urlParams.get('speed');
    const autoplay = urlParams.get('autoplay');

    if (extensionText) {
      // Switch to text tab and fill in
      document.querySelector('[data-tab="text"]').click();
      textInput.value = decodeURIComponent(extensionText);

      if (extensionVoice) voiceSelect.value = extensionVoice;
      if (extensionSpeed) speedSelect.value = extensionSpeed;

      // Auto-convert if requested
      if (autoplay === 'true') {
        setTimeout(() => convertBtn.click(), 500);
      }
    } else {
      // Handle shared URL
      const sharedUrl = urlParams.get('url');
      if (sharedUrl) {
        const urlMatch = sharedUrl.match(/https?:\/\/[^\s]+/);
        if (urlMatch) {
          urlInput.value = urlMatch[0];
        } else {
          urlInput.value = sharedUrl;
        }
      }
    }

    // Clean up URL (remove params after reading)
    if (urlParams.toString()) {
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    // PWA Install prompt
    let deferredPrompt;
    const installPrompt = document.getElementById('install-prompt');
    const installBtn = document.getElementById('install-btn');
    const dismissBtn = document.getElementById('dismiss-install');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installPrompt.classList.add('visible');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const result = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installPrompt.classList.remove('visible');
    });

    dismissBtn.addEventListener('click', () => {
      installPrompt.classList.remove('visible');
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // ==========================================
    // IndexedDB Library System
    // ==========================================

    const DB_NAME = 'helix-listen-library';
    const DB_VERSION = 1;
    const STORE_NAME = 'audio-items';
    const MAX_ITEMS = 5;

    let db = null;
    let currentPlayingId = null;

    // Initialize IndexedDB
    async function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          db = request.result;
          resolve(db);
        };

        request.onupgradeneeded = (event) => {
          const database = event.target.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            const store = database.createObjectStore(STORE_NAME, { keyPath: 'id' });
            store.createIndex('createdAt', 'createdAt', { unique: false });
          }
        };
      });
    }

    // Save audio item to library
    async function saveToLibrary(title, audioBlob, wordCount, duration) {
      if (!db) await initDB();

      const item = {
        id: Date.now().toString(),
        title,
        audioBlob,
        wordCount,
        duration,
        currentTime: 0,
        createdAt: new Date().toISOString(),
      };

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);

        // Add new item
        store.add(item);

        tx.oncomplete = async () => {
          // Enforce max items limit
          await enforceMaxItems();
          resolve(item);
        };
        tx.onerror = () => reject(tx.error);
      });
    }

    // Enforce maximum items in library
    async function enforceMaxItems() {
      const items = await getAllItems();
      if (items.length > MAX_ITEMS) {
        // Sort by createdAt and remove oldest
        items.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
        const toRemove = items.slice(0, items.length - MAX_ITEMS);
        for (const item of toRemove) {
          await deleteItem(item.id);
        }
      }
    }

    // Get all items from library
    async function getAllItems() {
      if (!db) await initDB();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();

        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }

    // Get single item
    async function getItem(id) {
      if (!db) await initDB();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(id);

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    // Update item (e.g., save playback position)
    async function updateItem(id, updates) {
      if (!db) await initDB();

      const item = await getItem(id);
      if (!item) return null;

      const updatedItem = { ...item, ...updates };

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put(updatedItem);

        tx.oncomplete = () => resolve(updatedItem);
        tx.onerror = () => reject(tx.error);
      });
    }

    // Delete item
    async function deleteItem(id) {
      if (!db) await initDB();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.delete(id);

        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    // Format time for display
    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Format date for display
    function formatDate(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString();
    }

    // Render library list
    async function renderLibrary() {
      const listEl = document.getElementById('library-list');
      const items = await getAllItems();

      // Sort by most recent first
      items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      if (items.length === 0) {
        listEl.innerHTML = '<div class="library-empty">No saved audio yet. Convert something to get started.</div>';
        return;
      }

      listEl.innerHTML = items.map(item => {
        const progress = item.duration ? (item.currentTime / item.duration) * 100 : 0;
        const isPlaying = item.id === currentPlayingId;
        const timeInfo = item.currentTime > 0
          ? `${formatTime(item.currentTime)} / ${formatTime(item.duration)}`
          : formatTime(item.duration);

        return `
          <div class="library-item ${isPlaying ? 'playing' : ''}" data-id="${item.id}">
            <div class="library-item-icon">${isPlaying ? '🔊' : '🎧'}</div>
            <div class="library-item-info">
              <div class="library-item-title">${item.title}</div>
              <div class="library-item-meta">${timeInfo} • ${formatDate(item.createdAt)}</div>
              <div class="library-item-progress">
                <div class="library-item-progress-bar" style="width: ${progress}%"></div>
              </div>
            </div>
            <button class="library-item-delete" data-id="${item.id}" title="Delete">🗑️</button>
          </div>
        `;
      }).join('');

      // Add click handlers
      listEl.querySelectorAll('.library-item').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('library-item-delete')) return;
          playFromLibrary(el.dataset.id);
        });
      });

      listEl.querySelectorAll('.library-item-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (id === currentPlayingId) {
            audioPlayer.pause();
            audioPlayer.src = '';
            currentPlayingId = null;
            playerSection.classList.remove('visible');
          }
          await deleteItem(id);
          renderLibrary();
        });
      });
    }

    // Play item from library
    async function playFromLibrary(id) {
      const item = await getItem(id);
      if (!item) return;

      currentPlayingId = id;
      currentAudioBlob = item.audioBlob;
      currentTitle = item.title;

      const audioUrl = URL.createObjectURL(item.audioBlob);
      audioPlayer.src = audioUrl;
      audioPlayer.currentTime = item.currentTime || 0;

      articleTitle.textContent = item.title;
      articleMeta.textContent = `${item.wordCount} words • ${formatTime(item.duration)}`;
      playerSection.classList.add('visible');

      audioPlayer.play().catch(() => {});
      renderLibrary();
    }

    // Save playback position periodically
    let savePositionTimeout = null;
    audioPlayer.addEventListener('timeupdate', () => {
      if (!currentPlayingId) return;

      // Debounce saves to every 2 seconds
      if (savePositionTimeout) return;
      savePositionTimeout = setTimeout(async () => {
        savePositionTimeout = null;
        await updateItem(currentPlayingId, {
          currentTime: audioPlayer.currentTime,
          duration: audioPlayer.duration
        });
        renderLibrary();
      }, 2000);
    });

    // Save position when paused
    audioPlayer.addEventListener('pause', async () => {
      if (!currentPlayingId) return;
      await updateItem(currentPlayingId, {
        currentTime: audioPlayer.currentTime,
        duration: audioPlayer.duration
      });
      renderLibrary();
    });

    // Mark as complete when finished
    audioPlayer.addEventListener('ended', async () => {
      if (!currentPlayingId) return;
      await updateItem(currentPlayingId, { currentTime: 0 });
      renderLibrary();
    });

    // Update duration when audio metadata loads
    audioPlayer.addEventListener('loadedmetadata', async () => {
      if (!currentPlayingId) return;
      await updateItem(currentPlayingId, { duration: audioPlayer.duration });
      renderLibrary();
    });

    // Initialize library on page load
    initDB().then(() => renderLibrary());
  </script>
</body>
</html>
